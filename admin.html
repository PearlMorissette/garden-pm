<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Admin — Pearl Morissette</title>
<style>
:root{--bg:#0A0A09;--card:#141413;--border:#2A2926;--cream:#E8E2D6;--muted:#8A8478;--accent:#C4A97D}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--accent);color:var(--bg);padding:10px 28px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,9,.96);z-index:100;flex-wrap:wrap;gap:10px}
.logo-top{font-size:18px;font-weight:300;letter-spacing:3px;font-family:Georgia,serif}
.logo-sub{font-size:10px;letter-spacing:4px;color:var(--muted);margin-top:2px}
.nav-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s}
.pill.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.pill:disabled{opacity:0.5;cursor:not-allowed}
.wrap{max-width:900px;margin:0 auto;padding:40px 24px}
.wrap-md{max-width:800px;margin:0 auto;padding:40px 24px}
.pre{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.h1{font-family:Georgia,serif;font-size:32px;font-weight:300;margin-bottom:32px}
.field-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field-input{width:100%;background:transparent;border:1px solid var(--border);color:var(--cream);padding:10px 14px;font-size:13px;outline:none;margin-bottom:16px}
.field-input:focus{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:var(--bg);border:none;padding:11px 24px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.btn-secondary{background:transparent;color:var(--cream);border:1px solid var(--border);padding:11px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.admin-row{display:grid;grid-template-columns:24px 1fr 90px 56px;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);align-items:center}
.dot{width:10px;height:10px;border-radius:50%;margin:0 auto}
.tog{font-size:10px;font-weight:700;width:48px;padding:6px 0;border:1px solid;text-align:center}
.tog-on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.tog-off{background:transparent;color:var(--muted);border-color:var(--border)}
.max-input{background:transparent;border:1px solid var(--border);color:var(--cream);width:80px;padding:6px 8px;font-size:12px;text-align:center;outline:none}
.max-input:focus{border-color:var(--accent)}
.stat-grid{display:grid;gap:1px;margin-bottom:40px}
.stat-card{background:var(--card);border:1px solid var(--border);padding:24px}
.stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:Georgia,serif;font-size:28px;font-weight:300}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.order-card{background:var(--card);border:1px solid var(--border);margin-bottom:2px}
.order-head{display:grid;grid-template-columns:1fr 140px 100px 80px;gap:12px;padding:14px 16px;align-items:center;cursor:pointer}
.order-detail{border-top:1px solid var(--border);padding:12px 16px}
.order-detail-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #1e1d1b}
.order-note{margin-top:10px;font-size:12px;color:var(--accent);font-style:italic}
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.loading{text-align:center;padding:80px 24px;color:var(--muted);font-size:13px;letter-spacing:1px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.auth-card{background:var(--card);border:1px solid var(--border);padding:40px 36px;width:100%;max-width:320px}
.auth-error{color:#c44;font-size:12px;margin-bottom:12px;display:none}
@media(max-width:600px){
  .admin-row{grid-template-columns:16px 1fr 70px 48px;gap:6px;padding:8px}
  .order-head{grid-template-columns:1fr 100px 80px 60px}
  nav{padding:12px 16px}
  .wrap,.wrap-md{padding:28px 16px}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="auth-screen">
  <div class="auth-card">
    <div class="pre">Garden Team</div>
    <div style="font-family:Georgia,serif;font-size:26px;font-weight:300;margin-bottom:28px">Admin Access</div>
    <label class="field-label">Passcode</label>
    <input class="field-input" type="password" id="admin-code" placeholder="........" onkeydown="if(event.key==='Enter')tryAdmin()">
    <div id="admin-err" class="auth-error">Incorrect passcode</div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn-primary" onclick="tryAdmin()">Enter</button>
    </div>
  </div>
</div>
<div id="main-app" style="display:none">
  <nav>
    <div>
      <div class="logo-top">GARDEN</div>
      <div class="logo-sub">Pearl Morissette · Admin</div>
    </div>
    <div class="nav-right">
      <button class="pill" id="tab-avail" onclick="switchTab('availability')">Availability</button>
      <button class="pill" id="tab-orders" onclick="switchTab('orders')">Orders</button>
      <button class="pill" id="tab-dash" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="pill" onclick="logout()" style="color:var(--muted)">Sign Out</button>
    </div>
  </nav>
  <div id="app-content"></div>
</div>

<script>
var API = "https://garden-pm-proxy-0a2d338d45e9.herokuapp.com";
var ADMIN_CODE = "garden2024";
var AUTH_KEY = "gpm_admin_auth";
var ADMIN_ORDERS_KEY = "gpm_adm_orders";

var state = {
  tab: "availability",
  products: [],
  availability: {},
  orders: [],
  adminCat: "All",
  historyFilter: "all",
  historyUnit: "All",
  openOrders: {}
};

// ── UTILS ──────────────────────────────────────────────────

function fmt(n){return "$"+Number(n).toFixed(2)}
function weekKey(d){var dt=new Date(d),j=new Date(dt.getFullYear(),0,1),w=Math.ceil(((dt-j)/86400000+j.getDay()+1)/7);return dt.getFullYear()+"-W"+String(w).padStart(2,"0")}
function monthKey(d){var dt=new Date(d);return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")}
function yearKey(d){return ""+new Date(d).getFullYear()}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show")},2500);
}

function api(params){
  return fetch(API+"?"+params).then(function(r){return r.json()});
}

// ── CACHE (orders only) ────────────────────────────────────

function cacheSet(key,data){
  try{localStorage.setItem(key,JSON.stringify({ts:Date.now(),data:data}))}catch(e){}
}

function cacheGet(key){
  try{
    var raw=localStorage.getItem(key);
    if(!raw) return null;
    return JSON.parse(raw).data;
  }catch(e){return null}
}

// ── AUTH ───────────────────────────────────────────────────

function tryAdmin(){
  var code=document.getElementById("admin-code").value;
  if(code===ADMIN_CODE){
    try{localStorage.setItem(AUTH_KEY,"1")}catch(e){}
    showAdmin();
  } else {
    document.getElementById("admin-err").style.display="block";
  }
}

function showAdmin(){
  document.getElementById("auth-screen").style.display="none";
  document.getElementById("main-app").style.display="block";
  showLoading();
  // Always fetch fresh on load — products and availability never cached
  Promise.all([fetchProducts(),fetchAvailability(),fetchOrders()]).then(function(){renderTab()});
}

function logout(){
  try{localStorage.removeItem(AUTH_KEY)}catch(e){}
  document.getElementById("auth-screen").style.display="flex";
  document.getElementById("main-app").style.display="none";
  document.getElementById("admin-code").value="";
}

function showLoading(){
  document.getElementById("app-content").innerHTML=
    '<div class="loading"><div class="spinner"></div>Loading...</div>';
}

// ── DATA FETCHERS ──────────────────────────────────────────

function fetchProducts(){
  // Always fresh — no cache
  return api("action=getProducts").then(function(data){
    if(data.products) state.products=data.products;
  }).catch(function(e){console.error("fetchProducts",e)});
}

function fetchAvailability(){
  // Always fresh — no cache, ensures sheet edits and admin edits stay in sync
  return api("action=getAvailability").then(function(data){
    if(data.availability) state.availability=data.availability;
  }).catch(function(e){console.error("fetchAvailability",e)});
}

function fetchOrders(){
  // Orders: cache for instant render, always refresh after
  return api("action=getOrders&unit=All").then(function(data){
    if(data.orders){
      state.orders=data.orders;
      cacheSet(ADMIN_ORDERS_KEY,data.orders);
    }
  }).catch(function(e){console.error("fetchOrders",e)});
}

// ── TAB SWITCHING ──────────────────────────────────────────

function switchTab(tab){
  state.tab=tab;
  renderTab(); // render current state immediately

  // Always re-fetch what this tab needs
  var promise;
  if(tab==="availability"){
    promise=Promise.all([fetchProducts(),fetchAvailability()]);
  } else if(tab==="orders"){
    // Render from cache instantly, then fetch fresh
    var cached=cacheGet(ADMIN_ORDERS_KEY);
    if(cached){state.orders=cached;renderTab();}
    promise=fetchOrders();
  } else {
    // Dashboard: cached orders render first, fresh fetch after
    var cached=cacheGet(ADMIN_ORDERS_KEY);
    if(cached){state.orders=cached;renderTab();}
    promise=Promise.all([fetchProducts(),fetchOrders()]);
  }
  promise.then(function(){renderTab()});
}

function renderTab(){
  document.getElementById("tab-avail").classList.toggle("active",state.tab==="availability");
  document.getElementById("tab-avail").textContent="Availability";
  document.getElementById("tab-avail").disabled=false;
  document.getElementById("tab-orders").classList.toggle("active",state.tab==="orders");
  document.getElementById("tab-orders").textContent="Orders";
  document.getElementById("tab-orders").disabled=false;
  document.getElementById("tab-dash").classList.toggle("active",state.tab==="dashboard");
  document.getElementById("tab-dash").textContent="Dashboard";
  document.getElementById("tab-dash").disabled=false;
  if(state.tab==="availability") renderAvailability();
  else if(state.tab==="orders") renderOrders();
  else renderDashboard();
}

// ── AVAILABILITY ───────────────────────────────────────────

function renderAvailability(){
  var cats=["All"].concat(Array.from(new Set(state.products.map(function(p){return p.category.trim()}))));
  var filtered=state.products.filter(function(p){return state.adminCat==="All"||p.category.trim()===state.adminCat});
  var onCount=Object.values(state.availability).filter(function(v){return v.on}).length;
  var html='<div class="wrap">'+
    '<div class="pre">This Week</div>'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px">'+
    '<div class="h1" style="margin-bottom:0">Availability</div>'+
    '<div style="font-size:12px;color:var(--muted)">'+onCount+" of "+state.products.length+" active</div></div>"+
    '<div class="filter-bar">'+cats.map(function(c){
      return '<button class="pill'+(state.adminCat===c?" active":"")+'" onclick="state.adminCat=\''+c+'\';renderAvailability()">'+c+"</button>";
    }).join("")+"</div>"+
    '<div style="display:grid;grid-template-columns:24px 1fr 90px 56px;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">'+
    '<div></div><div>Product</div><div style="text-align:center">Avail. QTY</div><div></div></div>';
  filtered.forEach(function(p){
    var av=state.availability[String(p.id)]||{on:false,remaining:null};
    var qty=av.remaining!==null?av.remaining:0;
    html+='<div class="admin-row">'+
      '<div class="dot" style="background:'+(av.on?"var(--accent)":"var(--border)")+'"></div>'+
      '<div><div style="font-size:13px">'+p.name+'</div>'+
      '<div style="font-size:11px;color:var(--muted)">'+p.category+" · "+fmt(p.price)+"/"+p.unit+'</div></div>'+
      '<input class="max-input" type="number" min="0" placeholder="—" value="'+(qty||"")+'" onchange="setMax('+p.id+',this.value)">'+
      '<button class="tog '+(av.on?"tog-on":"tog-off")+'" onclick="toggleAvail('+p.id+')">'+(av.on?"ON":"OFF")+"</button></div>";
  });
  document.getElementById("app-content").innerHTML=html+"</div>";
}

function toggleAvail(id){
  var cur=state.availability[String(id)]||{on:false,remaining:null};
  var newOn=!cur.on;
  // Optimistic update
  state.availability[String(id)]=Object.assign({},cur,{on:newOn});
  renderAvailability();
  api("action=setOne&id="+id+"&on="+newOn).then(function(r){
    if(r.success){
      showToast(newOn?"On":"Off");
      // Re-fetch to confirm sheet state is authoritative
      fetchAvailability().then(function(){renderAvailability()});
    } else {
      showToast("Error saving");
      state.availability[String(id)]=cur;
      renderAvailability();
    }
  });
}

function setMax(id,val){
  var qty=parseFloat(val)||0;
  var cur=state.availability[String(id)]||{on:false,remaining:null};
  // Optimistic update
  state.availability[String(id)]=Object.assign({},cur,{remaining:qty||null});
  api("action=setMax&id="+id+"&max="+qty).then(function(r){
    if(r.success){
      showToast("QTY saved");
      // Re-fetch to confirm sheet state is authoritative
      fetchAvailability().then(function(){renderAvailability()});
    } else {
      showToast("Error saving");
      state.availability[String(id)]=cur;
      renderAvailability();
    }
  });
}

// ── ORDERS ─────────────────────────────────────────────────

function isWholesale(unit){return unit!=="Restaurant"&&unit!=="Bakery"}

function renderOrders(){
  var rpmLife=state.orders.filter(function(o){return o.unit==="Restaurant"}).reduce(function(s,o){return s+o.total},0);
  var bakLife=state.orders.filter(function(o){return o.unit==="Bakery"}).reduce(function(s,o){return s+o.total},0);
  var wsLife=state.orders.filter(function(o){return isWholesale(o.unit)}).reduce(function(s,o){return s+o.total},0);
  var lifetime=state.orders.reduce(function(s,o){return s+o.total},0);

  var filtered=state.orders.filter(function(o){
    var now=new Date();
    if(state.historyUnit==="Wholesale"&&!isWholesale(o.unit)) return false;
    if(state.historyUnit!=="All"&&state.historyUnit!=="Wholesale"&&o.unit!==state.historyUnit) return false;
    if(state.historyFilter==="week") return weekKey(o.date)===weekKey(now);
    if(state.historyFilter==="month") return monthKey(o.date)===monthKey(now);
    if(state.historyFilter==="year") return yearKey(o.date)===yearKey(now);
    return true;
  });
  var periodSpend=filtered.reduce(function(s,o){return s+o.total},0);

  var html='<div class="wrap-md"><div class="pre">Garden Admin</div><div class="h1">Order History</div>'+
    '<div class="stat-grid" style="grid-template-columns:repeat(4,1fr)">'+
    '<div class="stat-card"><div class="stat-label">Total Lifetime</div><div class="stat-value">'+fmt(lifetime)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Restaurant</div><div class="stat-value">'+fmt(rpmLife)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Bakery</div><div class="stat-value">'+fmt(bakLife)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Wholesale</div><div class="stat-value">'+fmt(wsLife)+'</div></div>'+
    '</div>'+
    '<div class="filter-bar">'+[["all","All Time"],["week","This Week"],["month","This Month"],["year","This Year"]].map(function(x){
      return '<button class="pill'+(state.historyFilter===x[0]?" active":"")+'" onclick="state.historyFilter=\''+x[0]+'\';renderOrders()">'+x[1]+"</button>";
    }).join("")+"</div>"+
    '<div class="filter-bar">'+["All","Restaurant","Bakery","Wholesale"].map(function(u){
      return '<button class="pill'+(state.historyUnit===u?" active":"")+'" onclick="state.historyUnit=\''+u+'\';renderOrders()">'+u+"</button>";
    }).join("")+"</div>"+
    '<div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:12px;color:var(--muted)">'+
    '<span>'+filtered.length+' orders</span>'+
    '<span style="font-family:Georgia,serif;font-size:16px;color:var(--cream)">'+fmt(periodSpend)+'</span></div>';

  if(!filtered.length) html+='<div class="empty">No orders in this period.</div>';
  else filtered.forEach(function(o){
    var ds=new Date(o.date).toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
    var open=state.openOrders[o.id];
    var unitColor=o.unit==="Restaurant"?"var(--accent)":o.unit==="Bakery"?"#8a7a5a":"#7a8a6a";
    var unitLabel=o.unit==="Restaurant"&&o.station?o.unit+" · "+o.station:o.unit;
    html+='<div class="order-card">'+
      '<div class="order-head" onclick="state.openOrders['+o.id+']=!state.openOrders['+o.id+'];renderOrders()">'+
      '<div><div style="font-size:13px">'+ds+'</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+o.items.length+' items</div></div>'+
      '<div style="font-size:11px;letter-spacing:0.5px;color:'+unitColor+'">'+unitLabel+'</div>'+
      '<div style="text-align:right"><div style="font-family:Georgia,serif;font-size:16px">'+fmt(o.total)+'</div><div style="font-size:10px;color:var(--muted)">#'+o.id+'</div></div>'+
      '<div style="text-align:right;font-size:11px;color:var(--muted)">'+(open?"▲":"▼")+'</div></div>'+
      (open?'<div class="order-detail">'+
      o.items.map(function(i){return'<div class="order-detail-row"><span>'+i.name+'</span><span style="color:var(--muted)">'+i.qty+' '+i.unit+' · '+fmt(i.subtotal)+'</span></div>'}).join("")+
      (o.note?'<div class="order-note">'+o.note+'</div>':'')+
      '</div>':'')+
      '</div>';
  });
  document.getElementById("app-content").innerHTML=html+"</div>";
}

// ── DASHBOARD ──────────────────────────────────────────────

function renderDashboard(){
  var orders=state.orders;
  if(!orders.length){
    document.getElementById("app-content").innerHTML='<div class="wrap"><div class="pre">Garden Admin</div><div class="h1">Dashboard</div><div class="empty">No orders yet.</div></div>';
    return;
  }
  var lifetime=orders.reduce(function(s,o){return s+o.total},0);
  var rpmLife=orders.filter(function(o){return o.unit==="Restaurant"}).reduce(function(s,o){return s+o.total},0);
  var bakLife=orders.filter(function(o){return o.unit==="Bakery"}).reduce(function(s,o){return s+o.total},0);
  var wsLife=orders.filter(function(o){return isWholesale(o.unit)}).reduce(function(s,o){return s+o.total},0);
  var ytdOrders=orders.filter(function(o){return yearKey(o.date)===yearKey(new Date())});
  var ytdSpend=ytdOrders.reduce(function(s,o){return s+o.total},0);

  var catSpend={};
  orders.forEach(function(o){o.items.forEach(function(i){
    var p=state.products.find(function(p){return p.id===i.id});
    var cat=p?p.category:"Other";
    catSpend[cat]=(catSpend[cat]||0)+i.subtotal;
  })});
  var catEntries=Object.entries(catSpend).sort(function(a,b){return b[1]-a[1]});
  var maxCat=catEntries.length?catEntries[0][1]:1;

  var skuQty={};
  orders.forEach(function(o){o.items.forEach(function(i){skuQty[i.name]=(skuQty[i.name]||0)+i.qty})});
  var skuEntries=Object.entries(skuQty).sort(function(a,b){return b[1]-a[1]}).slice(0,10);

  var monthRpm={},monthBak={},monthWs={};
  orders.forEach(function(o){
    var mk=monthKey(o.date);
    if(o.unit==="Restaurant") monthRpm[mk]=(monthRpm[mk]||0)+o.total;
    else if(o.unit==="Bakery") monthBak[mk]=(monthBak[mk]||0)+o.total;
    else monthWs[mk]=(monthWs[mk]||0)+o.total;
  });
  var allMonths=Array.from(new Set(Object.keys(monthRpm).concat(Object.keys(monthBak)).concat(Object.keys(monthWs)))).sort().slice(-6);
  var maxMonth=allMonths.length?Math.max.apply(null,allMonths.map(function(m){return(monthRpm[m]||0)+(monthBak[m]||0)+(monthWs[m]||0)})):1;

  var html='<div class="wrap-md"><div class="pre">Garden Admin</div><div class="h1">Dashboard</div>'+
    '<div class="stat-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:40px">'+
    '<div class="stat-card"><div class="stat-label">Total Lifetime</div><div class="stat-value">'+fmt(lifetime)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">YTD</div><div class="stat-value">'+fmt(ytdSpend)+'</div><div class="stat-sub">'+ytdOrders.length+' orders</div></div>'+
    '<div class="stat-card"><div class="stat-label">Restaurant</div><div class="stat-value">'+fmt(rpmLife)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Bakery</div><div class="stat-value">'+fmt(bakLife)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Wholesale</div><div class="stat-value">'+fmt(wsLife)+'</div></div>'+
    '</div>'+
    '<div style="margin-bottom:48px"><div class="pre">Spend by Category</div>'+
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">'+
    catEntries.map(function(e){
      var pct=Math.round((e[1]/maxCat)*100);
      return '<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'+
        '<span>'+e[0]+'</span><span style="color:var(--accent)">'+fmt(e[1])+'</span></div>'+
        '<div style="background:var(--border);height:6px;border-radius:3px">'+
        '<div style="background:var(--accent);height:6px;border-radius:3px;width:'+pct+'%"></div></div></div>';
    }).join("")+"</div></div>"+
    // Spend by Station (Restaurant orders only)
    var rpmStationOrders=orders.filter(function(o){return o.unit==="Restaurant"&&o.station});
    if(rpmStationOrders.length){
      var stationSpend={};
      rpmStationOrders.forEach(function(o){stationSpend[o.station]=(stationSpend[o.station]||0)+o.total});
      var stationEntries=Object.entries(stationSpend).sort(function(a,b){return b[1]-a[1]});
      var maxStation=stationEntries[0][1];
      html+='<div style="margin-bottom:48px"><div class="pre">Restaurant Spend by Station</div>'+
        '<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">'+
        stationEntries.map(function(e){
          var pct=Math.round((e[1]/maxStation)*100);
          return '<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'+
            '<span>'+e[0]+'</span><span style="color:var(--accent)">'+fmt(e[1])+'</span></div>'+
            '<div style="background:var(--border);height:6px;border-radius:3px">'+
            '<div style="background:var(--accent);height:6px;border-radius:3px;width:'+pct+'%"></div></div></div>';
        }).join("")+'</div></div>';
    }
    html+='<div style="margin-bottom:48px"><div class="pre">Top Items by Quantity Ordered</div>'+
    '<div style="display:flex;flex-direction:column;gap:6px;margin-top:16px">'+
    skuEntries.map(function(e){
      var p=state.products.find(function(p){return p.name===e[0]});
      return '<div style="display:flex;justify-content:space-between;padding:10px 12px;background:var(--card);border:1px solid var(--border);font-size:13px">'+
        '<span>'+e[0]+'</span><span style="color:var(--accent);font-family:Georgia,serif">'+e[1]+' '+(p?p.unit:"")+'</span></div>';
    }).join("")+"</div></div>"+
    (allMonths.length>1?
    '<div style="margin-bottom:48px"><div class="pre">Monthly Spend by Unit</div>'+
    '<div style="display:flex;align-items:flex-end;gap:8px;margin-top:16px;height:140px">'+
    allMonths.map(function(m){
      var rpm=monthRpm[m]||0,bak=monthBak[m]||0,ws=monthWs[m]||0,total=rpm+bak+ws;
      var pct=Math.round((total/maxMonth)*100);
      var rpmPct=total>0?Math.round((rpm/total)*100):0;
      var bakPct=total>0?Math.round((bak/total)*100):0;
      var wsPct=100-rpmPct-bakPct;
      var label=new Date(m.split("-")[0],parseInt(m.split("-")[1])-1,1).toLocaleDateString("en-CA",{month:"short"});
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'+
        '<div style="font-size:10px;color:var(--muted)">'+fmt(total)+'</div>'+
        '<div style="flex:1;width:100%;display:flex;align-items:flex-end">'+
        '<div style="width:100%;height:'+pct+'%;min-height:4px;border-radius:2px 2px 0 0;overflow:hidden;display:flex;flex-direction:column">'+
        '<div style="background:var(--accent);flex:'+rpmPct+'"></div>'+
        '<div style="background:#5a4a2a;flex:'+bakPct+'"></div>'+
        '<div style="background:#3a5a3a;flex:'+wsPct+'"></div>'+
        '</div></div><div style="font-size:10px;color:var(--muted)">'+label+'</div></div>';
    }).join("")+
    '</div><div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted)">'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:2px;margin-right:4px"></span>Restaurant</span>'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:#5a4a2a;border-radius:2px;margin-right:4px"></span>Bakery</span>'+
    '<span><span style="display:inline-block;width:10px;height:10px;background:#3a5a3a;border-radius:2px;margin-right:4px"></span>Wholesale</span>'+
    '</div></div>':"")+"</div>";

  document.getElementById("app-content").innerHTML=html;
}
