<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Pearl Morissette</title>
<style>
:root{--bg:#0A0A09;--card:#141413;--border:#2A2926;--cream:#E8E2D6;--muted:#8A8478;--accent:#C4A97D}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--accent);color:var(--bg);padding:10px 28px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,10,9,.96);z-index:100;flex-wrap:wrap;gap:10px}
.logo{cursor:pointer}.logo-top{font-size:18px;font-weight:300;letter-spacing:3px;font-family:Georgia,serif}
.logo-sub{font-size:10px;letter-spacing:4px;color:var(--muted);margin-top:2px}
.nav-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 16px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s}
.pill.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.pill.cart-active{color:var(--accent);border-color:var(--accent)}
.wrap{max-width:900px;margin:0 auto;padding:40px 24px}
.wrap-sm{max-width:600px;margin:0 auto;padding:40px 24px}
.wrap-md{max-width:800px;margin:0 auto;padding:40px 24px}
.pre{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.h1{font-family:Georgia,serif;font-size:32px;font-weight:300;margin-bottom:32px}
.field-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field-input{width:100%;background:transparent;border:1px solid var(--border);color:var(--cream);padding:10px 14px;font-size:13px;outline:none;margin-bottom:16px}
.field-input:focus{border-color:var(--accent)}
.field-textarea{width:100%;background:transparent;border:1px solid var(--border);color:var(--cream);padding:10px 14px;font-size:13px;outline:none;resize:vertical;height:80px}
.field-textarea:focus{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:var(--bg);border:none;padding:11px 24px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.btn-secondary{background:transparent;color:var(--cream);border:1px solid var(--border);padding:11px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.btn-full{width:100%;padding:14px 0;font-size:12px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.search-input{background:var(--card);border:1px solid var(--border);color:var(--cream);padding:10px 14px;font-size:13px;outline:none;width:100%;max-width:280px;margin-bottom:16px}
.table-header{display:grid;padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.product-grid{grid-template-columns:1fr 90px 70px 80px}
.table-row{padding:10px 12px;border-bottom:1px solid var(--border);transition:background .15s}
.table-row:hover{background:var(--card)}
.product-row{display:grid;grid-template-columns:1fr 90px 70px 80px;align-items:center}
.p-name{font-size:13px}.p-cat{font-size:11px;color:var(--muted)}.p-note{font-size:11px;color:var(--accent);margin-top:2px}
.p-price{text-align:right;font-family:Georgia,serif;font-size:15px}
.p-unit{text-align:right;font-size:11px;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.qty-btn{background:transparent;border:1px solid var(--border);color:var(--cream);width:24px;height:24px;font-size:14px;display:flex;align-items:center;justify-content:center}
.qty-btn.on{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.qty-num{font-size:13px;min-width:16px;text-align:center}
.row-sel{background:#161510}
.admin-row{display:grid;grid-template-columns:24px 1fr 200px 50px;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);align-items:center}
.dot{width:10px;height:10px;border-radius:50%;margin:0 auto}
.tog{font-size:10px;font-weight:700;width:48px;padding:6px 0;border:1px solid;text-align:center}
.tog-on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.tog-off{background:transparent;color:var(--muted);border-color:var(--border)}
.checkout-row{display:grid;grid-template-columns:1fr 90px 80px 80px;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}
.total-bar{border-top:1px solid var(--accent);padding-top:20px;margin-top:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.stat-grid{display:grid;gap:1px;margin-bottom:40px}
.stat-card{background:var(--card);border:1px solid var(--border);padding:24px}
.stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:Georgia,serif;font-size:32px;font-weight:300}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.order-card{background:var(--card);border:1px solid var(--border);margin-bottom:2px}
.order-head{display:grid;grid-template-columns:1fr 100px 80px;gap:12px;padding:14px 16px;align-items:center;cursor:pointer}
.order-detail{border-top:1px solid var(--border);padding:12px 16px}
.order-detail-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #1e1d1b}
.order-note{margin-top:10px;font-size:12px;color:var(--accent);font-style:italic}
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-title{font-family:Georgia,serif;font-size:22px;font-weight:300;margin-bottom:8px;color:var(--cream)}
.loading{text-align:center;padding:80px 24px;color:var(--muted);font-size:13px;letter-spacing:1px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .product-grid,.product-row{grid-template-columns:1fr 70px 50px 70px}
  .admin-row{grid-template-columns:16px 1fr 100px 48px;gap:8px;padding:8px}
  .checkout-row{grid-template-columns:1fr 70px 70px 70px}
  nav{padding:12px 16px}
  .wrap,.wrap-sm,.wrap-md{padding:28px 16px}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>
<script>
var API = "https://script.google.com/a/macros/pearlmorissette.com/s/AKfycbxX7ZlKbIFsNTY1R8gq1HtjzwrOb52DDAPMIVjiYgGjtfwKhJ5wACTMPeZ4yMQthaTHdQ/exec";
var ADMIN_CODE = "garden2024";

var state = {
  screen: "entry",
  unit: null,
  isAdmin: false,
  products: [],
  availability: {},
  cart: {},
  orders: [],
  catFilter: "All",
  search: "",
  historyFilter: "all",
  historyUnit: "All",
  adminTab: "availability",
  adminCat: "All",
  openOrders: {}
};

function fmt(n) { return "$" + Number(n).toFixed(2); }
function weekKey(d){var dt=new Date(d),j=new Date(dt.getFullYear(),0,1),w=Math.ceil(((dt-j)/86400000+j.getDay()+1)/7);return dt.getFullYear()+"-W"+String(w).padStart(2,"0")}
function monthKey(d){var dt=new Date(d);return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")}
function yearKey(d){return ""+new Date(d).getFullYear()}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

function apiGet(action, extra) {
  var url = API + "?action=" + action + (extra || "");
  return fetch(url).then(function(r){ return r.json(); });
}

function apiPost(data) {
  return fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  }).then(function(r){ return r.json(); });
}

function render() {
  var app = document.getElementById("app");
  if (state.screen === "entry") app.innerHTML = entryHTML();
  else if (state.screen === "adminauth") app.innerHTML = adminAuthHTML();
  else if (state.screen === "admin") app.innerHTML = navHTML() + adminHTML();
  else if (state.screen === "client") app.innerHTML = navHTML() + clientHTML();
  else if (state.screen === "checkout") app.innerHTML = navHTML() + checkoutHTML();
  else if (state.screen === "history") app.innerHTML = navHTML() + historyHTML();
}

function go(screen) { state.screen = screen; render(); }

function loading(msg) {
  document.getElementById("app").innerHTML = (state.screen !== "entry" && state.screen !== "adminauth" ? navHTML() : "") +
    '<div class="loading"><div class="spinner"></div>' + (msg || "Loading...") + "</div>";
}

function entryHTML() {
  return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center">' +
    '<div style="margin-bottom:56px">' +
    '<div style="font-family:Georgia,serif;font-size:48px;font-weight:300;letter-spacing:-1px">Garden</div>' +
    '<div style="font-size:14px;letter-spacing:4px;color:var(--muted)">Pearl Morissette</div>' +
    '<div style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:4px">Jordan Station · Niagara</div>' +
    '</div>' +
    '<div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px">' +
    '<button style="background:var(--card);border:1px solid var(--border);color:var(--cream);padding:18px 24px;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:inherit" onclick="selectUnit(\'Restaurant\')">Restaurant</button>' +
    '<button style="background:var(--card);border:1px solid var(--border);color:var(--cream);padding:18px 24px;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:inherit" onclick="selectUnit(\'Bakery\')">Bakery</button>' +
    '<button style="background:none;border:none;color:var(--muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:inherit;margin-top:8px;padding:10px" onclick="go(\'adminauth\')">Garden Admin →</button>' +
    '</div></div>';
}

function adminAuthHTML() {
  return '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh">' +
    '<div style="background:var(--card);border:1px solid var(--border);padding:40px 36px;width:100%;max-width:320px">' +
    '<div class="pre">Garden Team</div>' +
    '<div style="font-family:Georgia,serif;font-size:26px;font-weight:300;margin-bottom:28px">Admin Access</div>' +
    '<label class="field-label">Passcode</label>' +
    '<input class="field-input" type="password" id="admin-code" placeholder="........" onkeydown="if(event.key===\'Enter\')tryAdmin()">' +
    '<div id="admin-err" style="color:#c44;font-size:12px;margin-bottom:12px;display:none">Incorrect passcode</div>' +
    '<div style="display:flex;gap:10px;margin-top:8px">' +
    '<button class="btn-primary" onclick="tryAdmin()">Enter</button>' +
    '<button class="btn-secondary" onclick="go(\'entry\')">Back</button>' +
    '</div></div></div>';
}

function tryAdmin() {
  var code = document.getElementById("admin-code") ? document.getElementById("admin-code").value : "";
  if (code === ADMIN_CODE) {
    state.isAdmin = true;
    state.adminTab = "availability";
    loading("Loading availability...");
    Promise.all([loadProducts(), loadAvailability(), loadOrders("All")]).then(function() {
      go("admin");
    });
  } else {
    var err = document.getElementById("admin-err");
    if (err) err.style.display = "block";
  }
}

function selectUnit(unit) {
  state.unit = unit;
  state.catFilter = "All";
  state.search = "";
  state.isAdmin = false;
  loading("Loading this week...");
  Promise.all([loadProducts(), loadAvailability()]).then(function() {
    go("client");
  });
}

function loadProducts() {
  return apiGet("getProducts").then(function(data) {
    if (data.products) state.products = data.products;
  }).catch(function(e){ console.error("loadProducts", e); });
}

function loadAvailability() {
  return apiGet("getAvailability").then(function(data) {
    if (data.availability) state.availability = data.availability;
  }).catch(function(e){ console.error("loadAvailability", e); });
}

function loadOrders(unit) {
  return apiGet("getOrders", "&unit=" + (unit || "All")).then(function(data) {
    if (data.orders) state.orders = data.orders;
  }).catch(function(e){ console.error("loadOrders", e); });
}

function navHTML() {
  var cc = Object.values(state.cart).reduce(function(s,q){ return s+q; }, 0);
  var right = "";
  if (state.isAdmin) {
    right = '<button class="pill' + (state.adminTab==="availability"?" active":"") + '" onclick="state.adminTab=\'availability\';go(\'admin\')">Availability</button>' +
      '<button class="pill' + (state.adminTab==="history"?" active":"") + '" onclick="state.adminTab=\'history\';loadOrders(\'All\').then(function(){go(\'admin\')})">Orders</button>';
  } else {
    right = '<span style="color:var(--muted);font-size:12px;letter-spacing:1px;margin-right:4px">' + state.unit + '</span>' +
      '<button class="pill' + (state.screen==="client"?" active":"") + '" onclick="go(\'client\')">Catalogue</button>' +
      '<button class="pill' + (state.screen==="history"?" active":"") + '" onclick="loadOrders(\'' + state.unit + '\').then(function(){go(\'history\')})">History</button>' +
      '<button class="pill' + (cc>0?" cart-active":"") + '" onclick="go(\'checkout\')">Order' + (cc>0?" ("+cc+")":"") + '</button>';
  }
  return '<nav><div class="logo" onclick="goEntry()"><div class="logo-top">GARDEN</div><div class="logo-sub">Pearl Morissette</div></div>' +
    '<div class="nav-right">' + right + '</div></nav>';
}

function goEntry() {
  state.unit = null;
  state.isAdmin = false;
  state.cart = {};
  go("entry");
}

function adminHTML() {
  if (state.adminTab === "history") return adminHistoryHTML();
  var cats = ["All"].concat(Array.from(new Set(state.products.map(function(p){ return p.category; }))));
  var filtered = state.products.filter(function(p){ return state.adminCat==="All"||p.category===state.adminCat; });
  var onCount = Object.values(state.availability).filter(function(v){ return v.on; }).length;
  var html = '<div class="wrap"><div class="pre">This Week</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px">' +
    '<div class="h1" style="margin-bottom:0">Availability</div>' +
    '<div style="font-size:12px;color:var(--muted)">' + onCount + " of " + state.products.length + " active</div></div>" +
    '<div class="filter-bar">' + cats.map(function(c){ return '<button class="pill' + (state.adminCat===c?" active":"") + '" onclick="state.adminCat=\'' + c + '\';go(\'admin\')">' + c + "</button>"; }).join("") + "</div>" +
    '<div style="display:grid;grid-template-columns:24px 1fr 200px 50px;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)"><div></div><div>Product</div><div>Note</div><div></div></div>';
  filtered.forEach(function(p) {
    var av = state.availability[String(p.id)] || {on:false,note:""};
    html += '<div class="admin-row">' +
      '<div class="dot" style="background:' + (av.on?"var(--accent)":"var(--border)") + '"></div>' +
      '<div><div style="font-size:13px">' + p.name + '</div><div style="font-size:11px;color:var(--muted)">' + p.category + " · " + fmt(p.price) + "/" + p.unit + "</div></div>" +
      '<input class="field-input" style="margin:0;opacity:' + (av.on?1:0.45) + ';font-size:11px;padding:6px 10px" placeholder="Note" value="' + (av.note||"") + '" onchange="setNote(' + p.id + ',this.value)">' +
      '<button class="tog ' + (av.on?"tog-on":"tog-off") + '" onclick="toggleAvail(' + p.id + ')">' + (av.on?"ON":"OFF") + "</button></div>";
  });
  return html + "</div>";
}

function toggleAvail(id) {
  var cur = state.availability[String(id)] || {on:false,note:""};
  state.availability[String(id)] = {on:!cur.on, note:cur.note||""};
  var toSave = {}; toSave[id] = state.availability[String(id)];
  apiPost({action:"setAvailability", availability:toSave});
  go("admin");
}

function setNote(id, note) {
  var cur = state.availability[String(id)] || {on:false,note:""};
  state.availability[String(id)] = {on:cur.on, note:note};
  var toSave = {}; toSave[id] = state.availability[String(id)];
  apiPost({action:"setAvailability", availability:toSave});
}

function adminHistoryHTML() {
  var rpmLife = state.orders.filter(function(o){return o.unit==="Restaurant";}).reduce(function(s,o){return s+o.total;},0);
  var bakLife = state.orders.filter(function(o){return o.unit==="Bakery";}).reduce(function(s,o){return s+o.total;},0);
  var lifetime = state.orders.reduce(function(s,o){return s+o.total;},0);
  var filtered = state.orders.filter(function(o){
    var now = new Date();
    if (state.historyUnit!=="All"&&o.unit!==state.historyUnit) return false;
    if (state.historyFilter==="week") return weekKey(o.date)===weekKey(now);
    if (state.historyFilter==="month") return monthKey(o.date)===monthKey(now);
    if (state.historyFilter==="year") return yearKey(o.date)===yearKey(now);
    return true;
  });
  var periodSpend = filtered.reduce(function(s,o){return s+o.total;},0);
  var html = '<div class="wrap-md"><div class="pre">Garden Admin</div><div class="h1">Order History</div>' +
    '<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">' +
    '<div class="stat-card"><div class="stat-label">Total Lifetime</div><div class="stat-value">' + fmt(lifetime) + "</div></div>" +
    '<div class="stat-card"><div class="stat-label">Restaurant</div><div class="stat-value">' + fmt(rpmLife) + "</div></div>" +
    '<div class="stat-card"><div class="stat-label">Bakery</div><div class="stat-value">' + fmt(bakLife) + "</div></div></div>" +
    '<div class="filter-bar">' + [["all","All Time"],["week","This Week"],["month","This Month"],["year","This Year"]].map(function(x){ return '<button class="pill' + (state.historyFilter===x[0]?" active":"") + '" onclick="state.historyFilter=\'' + x[0] + '\';go(\'admin\')">' + x[1] + "</button>"; }).join("") + "</div>" +
    '<div class="filter-bar">' + ["All","Restaurant","Bakery"].map(function(u){ return '<button class="pill' + (state.historyUnit===u?" active":"") + '" onclick="state.historyUnit=\'' + u + '\';go(\'admin\')">' + u + "</button>"; }).join("") + "</div>" +
    '<div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:12px;color:var(--muted)"><span>' + filtered.length + " orders</span><span style=\"font-family:Georgia,serif;font-size:16px;color:var(--cream)\">" + fmt(periodSpend) + "</span></div>";
  if (!filtered.length) { html += '<div class="empty">No orders in this period.</div>'; }
  else { filtered.forEach(function(o){ html += orderCardHTML(o, true, "admin"); }); }
  return html + "</div>";
}

function clientHTML() {
  var available = state.products.filter(function(p){ return state.availability[String(p.id)]&&state.availability[String(p.id)].on; });
  var cats = ["All"].concat(Array.from(new Set(available.map(function(p){ return p.category; }))));
  if (state.catFilter!=="All"&&cats.indexOf(state.catFilter)<0) state.catFilter="All";
  var filtered = available.filter(function(p){
    if (state.catFilter!=="All"&&p.category!==state.catFilter) return false;
    if (state.search&&p.name.toLowerCase().indexOf(state.search.toLowerCase())<0) return false;
    return true;
  });
  var weekStr = new Date().toLocaleDateString("en-CA",{month:"long",day:"numeric",year:"numeric"});
  var html = '<div class="wrap"><div class="pre">Week of ' + weekStr + '</div><div class="h1">This Week\'s Harvest</div>';
  if (!available.length) {
    html += '<div class="empty"><div class="empty-title">Nothing listed yet</div><p>The garden team has not set this week\'s availability.</p></div>';
  } else {
    html += '<input class="search-input" placeholder="Search..." value="' + state.search + '" oninput="state.search=this.value;go(\'client\')">' +
      '<div class="filter-bar">' + cats.map(function(c){ return '<button class="pill' + (state.catFilter===c?" active":"") + '" onclick="state.catFilter=\'' + c + '\';go(\'client\')">' + c + "</button>"; }).join("") + "</div>" +
      '<div class="table-header product-grid"><div>Product</div><div style="text-align:right">Price</div><div style="text-align:right">Unit</div><div style="text-align:right">Qty</div></div>';
    filtered.forEach(function(p) {
      var av = state.availability[String(p.id)];
      var qty = state.cart[p.id]||0;
      html += '<div class="table-row product-row' + (qty>0?" row-sel":"") + '">' +
        '<div><div class="p-name">' + p.name + "</div>" + (av&&av.note?'<div class="p-note">'+av.note+"</div>":"") + '<div class="p-cat">' + p.category + "</div></div>" +
        '<div class="p-price">' + fmt(p.price) + "</div>" +
        '<div class="p-unit">' + p.unit + "</div>" +
        '<div class="qty-ctrl">' + (qty>0?'<button class="qty-btn" onclick="updateCart('+p.id+',-1)">-</button><span class="qty-num">'+qty+"</span>":"") +
        '<button class="qty-btn' + (qty>0?" on":"") + '" onclick="updateCart(' + p.id + ',1)">+</button></div></div>';
    });
    html += '<div style="padding:16px 0;color:var(--muted);font-size:12px">' + filtered.length + " products shown</div>";
  }
  return html + "</div>";
}

function updateCart(id, delta) {
  var n = Math.max(0, (state.cart[id]||0) + delta);
  if (n===0) delete state.cart[id]; else state.cart[id]=n;
  go("client");
}

function checkoutHTML() {
  var items = Object.entries(state.cart).filter(function(e){return e[1]>0;}).map(function(e){
    var p = state.products.find(function(p){return p.id===Number(e[0]);});
    return {id:p.id,name:p.name,price:p.price,unit:p.unit,qty:e[1]};
  });
  var total = items.reduce(function(s,i){return s+i.price*i.qty;},0);
  var html = '<div class="wrap-sm"><div class="pre">' + state.unit + '</div><div class="h1">Your Order</div>';
  if (!items.length) {
    html += '<div class="empty"><div class="empty-title">Nothing added yet</div><button class="btn-primary" style="margin-top:16px" onclick="go(\'client\')">Browse Catalogue</button></div>';
  } else {
    html += '<div class="table-header" style="grid-template-columns:1fr 90px 80px 80px"><div>Item</div><div style="text-align:center">Qty</div><div style="text-align:right">Unit</div><div style="text-align:right">Total</div></div>';
    items.forEach(function(i) {
      html += '<div class="table-row checkout-row">' +
        '<div style="font-size:13px">' + i.name + "</div>" +
        '<div style="display:flex;align-items:center;justify-content:center;gap:6px"><button class="qty-btn" onclick="updateCart('+i.id+',-1);go(\'checkout\')">-</button><span class="qty-num">'+i.qty+'</span><button class="qty-btn" onclick="updateCart('+i.id+',1);go(\'checkout\')">+</button></div>' +
        '<div style="text-align:right;font-size:11px;color:var(--muted)">' + i.qty + " " + i.unit + "</div>" +
        '<div style="text-align:right;font-family:Georgia,serif;font-size:15px">' + fmt(i.price*i.qty) + "</div></div>";
    });
    html += '<div class="total-bar"><span style="color:var(--muted);font-size:12px">Order Total</span><span style="font-family:Georgia,serif;font-size:28px;font-weight:300">' + fmt(total) + "</span></div>" +
      '<label class="field-label">Note to Garden (optional)</label>' +
      '<textarea class="field-textarea" id="order-note" placeholder="Timing, substitutions..."></textarea>' +
      '<button class="btn-primary btn-full" style="margin-top:16px" onclick="submitOrder()">Submit Order</button>';
  }
  return html + "</div>";
}

function submitOrder() {
  var items = Object.entries(state.cart).filter(function(e){return e[1]>0;}).map(function(e){
    var p = state.products.find(function(p){return p.id===Number(e[0]);});
    return {id:p.id,name:p.name,qty:e[1],unit:p.unit,price:p.price,subtotal:p.price*e[1]};
  });
  var total = items.reduce(function(s,i){return s+i.subtotal;},0);
  var note = document.getElementById("order-note")?document.getElementById("order-note").value:"";
  var order = {unit:state.unit,date:new Date().toISOString(),items:items,total:total,note:note};
  apiPost({action:"submitOrder",order:order}).then(function(){
    state.cart = {};
    showToast("Order submitted");
    go("client");
  }).catch(function(){
    showToast("Error submitting — try again");
  });
}

function historyHTML() {
  var myOrders = state.orders.filter(function(o){return o.unit===state.unit;});
  var filtered = myOrders.filter(function(o){
    var now = new Date();
    if (state.historyFilter==="week") return weekKey(o.date)===weekKey(now);
    if (state.historyFilter==="month") return monthKey(o.date)===monthKey(now);
    if (state.historyFilter==="year") return yearKey(o.date)===yearKey(now);
    return true;
  });
  var lifetime = myOrders.reduce(function(s,o){return s+o.total;},0);
  var periodSpend = filtered.reduce(function(s,o){return s+o.total;},0);
  var html = '<div class="wrap-md"><div class="pre">' + state.unit + '</div><div class="h1">Order History</div>' +
    '<div class="stat-grid" style="grid-template-columns:repeat(2,1fr)">' +
    '<div class="stat-card"><div class="stat-label">Lifetime Spend</div><div class="stat-value">' + fmt(lifetime) + "</div></div>" +
    '<div class="stat-card"><div class="stat-label">This Period</div><div class="stat-value">' + fmt(periodSpend) + '</div><div class="stat-sub">' + filtered.length + " orders</div></div></div>" +
    '<div class="filter-bar">' + [["all","All Time"],["week","This Week"],["month","This Month"],["year","This Year"]].map(function(x){ return '<button class="pill' + (state.historyFilter===x[0]?" active":"") + '" onclick="state.historyFilter=\'' + x[0] + '\';go(\'history\')">' + x[1] + "</button>"; }).join("") + "</div>";
  if (!filtered.length) { html += '<div class="empty">No orders in this period.</div>'; }
  else { filtered.forEach(function(o){ html += orderCardHTML(o, false, "history"); }); }
  return html + "</div>";
}

function orderCardHTML(o, showUnit, screen) {
  var ds = new Date(o.date).toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
  var open = state.openOrders[o.id];
  return '<div class="order-card">' +
    '<div class="order-head" onclick="state.openOrders[' + o.id + ']=!state.openOrders[' + o.id + '];go(\'' + screen + '\')">' +
    '<div><div style="font-size:13px">' + ds + (showUnit?' <span style="font-size:11px;color:var(--accent);margin-left:8px">'+o.unit+"</span>":"") + "</div>" +
    '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + o.items.length + " items</div></div>" +
    '<div style="font-family:Georgia,serif;font-size:16px;text-align:right">' + fmt(o.total) + "</div>" +
    '<div style="text-align:right;font-size:11px;color:var(--muted)">' + (open?"▲":"▼") + "</div></div>" +
    (open?'<div class="order-detail">' + o.items.map(function(i){ return '<div class="order-detail-row"><span>'+i.name+"</span><span style=\"color:var(--muted)\">"+i.qty+" "+i.unit+" · "+fmt(i.subtotal)+"</span></div>"; }).join("") + (o.note?'<div class="order-note">'+o.note+"</div>":"") + "</div>":"") +
    "</div>";
}

render();
</script>
</body>
</html>
